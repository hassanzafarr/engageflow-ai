<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['"Inter Tight"', 'ui-sans-serif', 'system-ui'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          ink: { 950: '#09090b', 900: '#0c0c0f', 850: '#111114', 800: '#18181b', 700: '#1f1f23', 600: '#27272a', 500: '#3f3f46' },
          em: { 300: '#6ee7b7', 400: '#34d399', 500: '#10b981', 600: '#059669', 700: '#047857' },
          vi: { 300: '#c4b5fd', 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9' },
        },
        boxShadow: {
          'glow-em': '0 0 0 1px rgba(16,185,129,.35), 0 12px 60px -12px rgba(16,185,129,.55)',
          'glow-vi': '0 0 0 1px rgba(139,92,246,.35), 0 12px 60px -12px rgba(139,92,246,.55)',
        },
      },
    },
  };
</script>

<style>
  html, body { background: #09090b; color: #fafafa; }
  body { font-family: 'Inter Tight', ui-sans-serif, system-ui; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  ::selection { background: rgba(139,92,246,.35); color: #fff; }

  /* Gradient text */
  .text-grad {
    background: linear-gradient(96deg, #ffffff 0%, #d4d4d8 35%, #a78bfa 60%, #34d399 90%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .text-grad-2 {
    background: linear-gradient(110deg, #ffffff 0%, #ffffff 40%, #6ee7b7 70%, #c4b5fd 100%);
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }

  /* Glass card */
  .glass {
    background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.015));
    border: 1px solid rgba(255,255,255,.08);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
  }
  .glass-strong {
    background: linear-gradient(180deg, rgba(24,24,27,.7), rgba(15,15,18,.55));
    border: 1px solid rgba(255,255,255,.09);
    backdrop-filter: blur(18px) saturate(150%);
    -webkit-backdrop-filter: blur(18px) saturate(150%);
  }

  .ring-grad { position: relative; }
  .ring-grad::before {
    content: ""; position: absolute; inset: -1px; border-radius: inherit; padding: 1px;
    background: linear-gradient(135deg, rgba(139,92,246,.6), rgba(16,185,129,.5) 50%, rgba(139,92,246,.1));
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events: none;
  }

  /* Subtle grid background */
  .bg-grid {
    background-image:
      linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
    background-size: 56px 56px;
    background-position: -1px -1px;
  }
  .bg-grid-fade {
    -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, #000 40%, transparent 80%);
            mask-image: radial-gradient(ellipse 70% 60% at 50% 30%, #000 40%, transparent 80%);
  }

  /* Marquee */
  @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .marquee-track { animation: marquee 40s linear infinite; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 8px; }

  /* range input baseline */
  input[type=range].neon {
    -webkit-appearance: none; appearance: none; height: 6px; border-radius: 999px;
    background: linear-gradient(90deg, #8b5cf6 var(--p,50%), rgba(255,255,255,.08) var(--p,50%));
  }
  input[type=range].neon::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 18px; height: 18px; border-radius: 999px;
    background: #fff; box-shadow: 0 0 0 4px rgba(139,92,246,.25), 0 0 24px rgba(139,92,246,.7);
    cursor: grab;
  }
  input[type=range].neon::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 999px; background: #fff; border: 0;
    box-shadow: 0 0 0 4px rgba(139,92,246,.25), 0 0 24px rgba(139,92,246,.7);
  }

  /* glow utilities */
  .em-glow { box-shadow: 0 0 0 1px rgba(16,185,129,.45), 0 10px 40px -8px rgba(16,185,129,.55), inset 0 0 20px -8px rgba(110,231,183,.45); }
  .vi-glow { box-shadow: 0 0 0 1px rgba(139,92,246,.45), 0 10px 40px -8px rgba(139,92,246,.55), inset 0 0 20px -8px rgba(196,181,253,.45); }

  /* hide tweaks panel inversion since we're dark */
  .twk-panel { color-scheme: light; }

  /* prevent layout shift from images */
  img { display: block; }

  /* utility */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
</style>
</head>
